version: '3.8'

services:
  autoconfig:
    build: .
    container_name: autoconfig
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    volumes:
      # Optional: mount config directories for easier management
      - ./clientConfigs:/app/clientConfigs:ro
      - ./templates:/app/templates:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

